name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build extension
        run: |
          npm install
          npm run package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/usertour-lens.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
